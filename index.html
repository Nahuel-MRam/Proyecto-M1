<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de Paletas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main>
      <h1>Generador de Paletas</h1>
      <!---CONTROLES---->
      <div class="controles">
        <label for="select-cantidad">Cantidad de colores:</label>
        <select id="select-cantidad">
          <option value="6">6 colores</option>
          <option value="8">8 colores</option>
          <option value="9">9 colores</option>
        </select>

        <button id="btn-generar">Generar Paleta</button>

        <!-----Toggle de formato-------->
        <div class="toggle-formato">
          <span>HEX</span>
          <label class="toggle"">
            <input type="checkbox" id="toggle-formato">
            <span class="slider"></span>
          </label>
          <span>HSL</span>
        </div>
      </div>

      <!---RENDERIZAMOS LAS TARJETAS DE COLORES---->
      <div
        id="paleta"
        role="lista"
        aria-label="Paleta de colores generada"
      ></div>
    </main>
    <!-- Toast para microfeedback -->
    <div id="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
